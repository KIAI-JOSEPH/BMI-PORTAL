name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: |
          cd backend
          npm ci

      - name: Type check frontend
        run: npm run typecheck

      - name: Type check E2E tests
        run: npx tsc --noEmit -p tsconfig.e2e.json

      - name: Type check backend
        run: cd backend && npx tsc --noEmit

      - name: Lint backend
        run: |
          cd backend
          npm run lint || true

      - name: Build frontend
        run: npm run build

      - name: Build backend
        run: |
          cd backend
          npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            dist/
            backend/dist/
          retention-days: 7

  test:
    runs-on: ubuntu-latest
    needs: lint-and-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Run frontend tests
        run: npm run test

      - name: Run backend tests
        run: cd backend && npm test

  e2e:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install frontend dependencies
        run: npm ci

      - name: Install backend dependencies
        run: cd backend && npm ci

      - name: Install Playwright browsers (Chromium only for CI speed)
        run: npx playwright install chromium --with-deps

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-artifacts

      - name: Start backend API server
        run: |
          cd backend
          cp .env.example .env
          # Generate secrets for the test run
          node -e "const c=require('crypto'),fs=require('fs');fs.appendFileSync('.env','JWT_SECRET='+c.randomBytes(32).toString('hex')+'\n'+'ENCRYPTION_KEY='+c.randomBytes(32).toString('hex')+'\n')"
          echo "POCKETBASE_ADMIN_EMAIL=admin@bmi.edu" >> .env
          echo "POCKETBASE_ADMIN_PASSWORD=CITestAdmin2024!!" >> .env
          npm run start &
        env:
          NODE_ENV: test

      - name: Start PocketBase (self-hosted, open source — MIT)
        run: |
          # Download PocketBase binary — 100% open source (MIT)
          PB_VERSION=0.22.1
          wget -q https://github.com/pocketbase/pocketbase/releases/download/v${PB_VERSION}/pocketbase_${PB_VERSION}_linux_amd64.zip
          unzip -q pocketbase_${PB_VERSION}_linux_amd64.zip -d ./pb_bin
          chmod +x ./pb_bin/pocketbase
          ./pb_bin/pocketbase serve --http=127.0.0.1:8090 &
          sleep 3

      - name: Serve built frontend (vite preview)
        run: |
          npm run preview -- --port 3000 --host 127.0.0.1 &
          sleep 2
        env:
          E2E_BASE_URL: http://127.0.0.1:3000

      - name: Run E2E tests (Chromium — open source)
        run: npx playwright test --project=chromium
        env:
          CI: "true"
          E2E_BASE_URL: http://127.0.0.1:3000
          E2E_ADMIN_EMAIL: admin@bmi.edu
          E2E_ADMIN_PASSWORD: CITestAdmin2024!!

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  security-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run npm audit (frontend)
        run: npm audit --audit-level=high || echo "::warning::Frontend has high+ severity vulnerabilities — review AUDIT/ROADMAP_TODO.md P1-05"

      - name: Run npm audit (backend)
        run: |
          cd backend
          npm audit --audit-level=high || echo "::warning::Backend has high+ severity vulnerabilities — review AUDIT/ROADMAP_TODO.md P1-05"
