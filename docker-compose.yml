version: '3.8'

services:
  # PocketBase - Database & Auth (internal only — access via Caddy reverse proxy)
  pocketbase:
    image: ghcr.io/muchobien/pocketbase:latest
    container_name: bmi-pocketbase
    restart: unless-stopped
    expose:
      - "8090"
    volumes:
      - ./data/pb_data:/pb_data
      - ./data/pb_public:/pb_public
    environment:
      - PB_ENCRYPTION_KEY=${PB_ENCRYPTION_KEY}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - bmi-network

  # Litestream - Continuous SQLite replication (Apache 2.0 open source)
  # Streams PocketBase WAL changes to S3-compatible storage in near real-time.
  # If the server dies, restore with: litestream restore -replica s3 /pb_data/data.db
  # Docs: https://litestream.io
  litestream:
    image: litestream/litestream:latest
    container_name: bmi-litestream
    restart: unless-stopped
    command: replicate
    volumes:
      - ./data/pb_data:/pb_data:ro          # read-only access to SQLite files
      - ./litestream.yml:/etc/litestream.yml:ro
    environment:
      - LITESTREAM_ACCESS_KEY_ID=${LITESTREAM_ACCESS_KEY_ID:-}
      - LITESTREAM_SECRET_ACCESS_KEY=${LITESTREAM_SECRET_ACCESS_KEY:-}
    depends_on:
      pocketbase:
        condition: service_healthy
    networks:
      - bmi-network

  # Ollama - Local LLM (internal only — no public access)
  ollama:
    image: ollama/ollama:latest
    container_name: bmi-ollama
    restart: unless-stopped
    # No public ports — only accessible within Docker network
    expose:
      - "11434"
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_ORIGINS=http://api:3001
      - OLLAMA_HOST=0.0.0.0
    # GPU support (optional - uncomment if you have NVIDIA GPU)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - bmi-network

  # BMI UMS Backend API (internal — exposed through Caddy only)
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bmi-api
    restart: unless-stopped
    # No direct public port — traffic flows through Caddy reverse proxy
    expose:
      - "3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - POCKETBASE_URL=http://pocketbase:8090
      - POCKETBASE_ADMIN_EMAIL=${POCKETBASE_ADMIN_EMAIL}
      - POCKETBASE_ADMIN_PASSWORD=${POCKETBASE_ADMIN_PASSWORD}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2}
      - CORS_ORIGIN=${CORS_ORIGIN}
    volumes:
      - ./logs:/app/logs
      - ./backend:/app
      - /app/node_modules
    depends_on:
      pocketbase:
        condition: service_healthy
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - bmi-network

  # Caddy - Reverse Proxy with Automatic HTTPS
  caddy:
    image: caddy:2-alpine
    container_name: bmi-caddy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api
    networks:
      - bmi-network

volumes:
  ollama_data:
  caddy_data:
  caddy_config:

networks:
  bmi-network:
    driver: bridge
