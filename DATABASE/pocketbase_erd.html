
<style>
#erd { padding: 0 0 8px; }
#erd svg { width: 100%; height: auto; }
.badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:500; margin-left:6px; vertical-align:middle; }
.badge-pk { background:#EEEDFE; color:#3C3489; }
.badge-fk { background:#E1F5EE; color:#085041; }
</style>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
  },
});
const { svg } = await mermaid.render('erd-svg', `erDiagram
  campuses ||--o{ students : "enrolled at"
  students ||--o{ academic_records : "has"
  courses ||--o{ academic_records : "graded in"
  modules ||--o{ courses : "contains"
  students ||--o{ attendance : "tracked in"
  courses ||--o{ attendance : "tracked for"

  campuses {
    text id PK
    text name
    text location
  }

  students {
    text id PK
    text student_code
    text reg_no
    text full_name
    select gender
    date date_of_birth
    text nationality
    text phone
    email email
    text admission_no
    date admission_date
    select programme
    select status
    relation campus_id FK
  }

  modules {
    text id PK
    text name
    select semester
    number sort_order
  }

  courses {
    text id PK
    text code
    text title
    text category
    number credit_hours
    relation module_id FK
  }

  academic_records {
    text id PK
    relation student_id FK
    relation course_id FK
    number total_score
    number ca_score
    number exam_score
    text grade
    number grade_point
    text remarks
    text academic_year
  }

  attendance {
    text id PK
    relation student_id FK
    relation course_id FK
    number total_classes
    number classes_attended
    number attendance_pct
  }
`);
document.getElementById('erd').innerHTML = svg;
document.querySelectorAll('#erd svg.erDiagram .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill', 'stroke', 'stroke-width', 'class', 'style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});
document.querySelectorAll('#erd svg.erDiagram .row-rect-odd path, #erd svg.erDiagram .row-rect-even path').forEach(p => {
  p.setAttribute('stroke', 'none');
});
</script>
